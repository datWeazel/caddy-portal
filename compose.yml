services:
  caddy-portal:
    build: .
    image: caddy-portal:dev
    ports:
      - "8080:80"
      - "8443:443"
      - "8443:443/udp"
    environment:
      STAGE: local
      DOMAINS: "test.localhost"
    volumes:
      - caddy-portal-data:/var/lib/https-portal
      - /var/run/docker.sock:/var/run/docker.sock:ro

  whoami:
    image: traefik/whoami:v1.10
    environment:
      VIRTUAL_HOST: "whoami.localhost"
      VIRTUAL_PORT: "80"

volumes:
  caddy-portal-data:
