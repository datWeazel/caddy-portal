name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Cancel in-flight runs on the same branch when a new commit lands.
# Tag pushes are handled by release.yml so they never reach here.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

  docker-build:
    # Only validate the Dockerfile on PRs. On main the same code already
    # passed PR CI, and tag pushes go through release.yml which builds for
    # real and pushes.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Single-arch build to verify the Dockerfile is sane. The release
      # workflow is what produces multi-arch artefacts.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: caddy-portal:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — container starts and answers HTTPS
        run: |
          docker run -d --name smoke \
            -p 8080:80 -p 8443:443 \
            -e STAGE=local \
            -e DOMAINS=test.localhost \
            caddy-portal:ci
          for i in $(seq 1 30); do
            if curl -ksf -o /dev/null \
                --resolve test.localhost:8443:127.0.0.1 \
                https://test.localhost:8443/; then
              echo "✓ container answered on attempt $i"
              docker rm -f smoke
              exit 0
            fi
            sleep 1
          done
          echo "✗ container did not answer within 30s"
          docker logs smoke
          docker rm -f smoke
          exit 1
